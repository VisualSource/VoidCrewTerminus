# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v7
    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build VoidCrewTerminus.slnx --no-restore -c Release
    - name: Extract release notes from CHANGELOG.md
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $lines = Get-Content "VoidCrewTerminus/ReleaseFiles/CHANGELOG.md"
        $start = -1
        $end = $lines.Length
        for ($i = 0; $i -lt $lines.Length; $i++) {
            if ($lines[$i] -eq "## $tag") {
                $start = $i + 1
            } elseif ($start -ge 0 -and $lines[$i] -match '^## ') {
                $end = $i
                break
            }
        }
        if ($start -lt 0) {
            Write-Error "No CHANGELOG.md section found for tag '$tag'"
            exit 1
        }
        $body = ($lines[$start..($end - 1)] -join "`n").Trim()
        Set-Content -Path release-body.md -Value $body -Encoding utf8
    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        draft: true
        prerelease: false
        name: VoidCrewTerminus ${{ github.ref_name }}
        body_path: release-body.md
        files: ./VoidCrewTerminus/bin/Release/net472/Releases/VoidCrewTerminus-${{ github.ref_name }}.zip
