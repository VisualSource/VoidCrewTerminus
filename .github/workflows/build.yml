# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build VoidCrewTerminus.slnx --no-restore -c Release
    - name: release
      uses: actions/create-release@v1
      id: create_release
      with:
        draft: true 
        prerelease: false
        release_name: VoidCrewTerminus
        tag_name: ${{ github.ref }}
        body_path: ./VoidCrewTerminus/ReleaseFiles/CHANGELOG.md
      env:
        GITHUB_TOKEN: ${{ github.token }}
    - uses: olegtarasov/get-tag@v2.1.3
      id: tagName
    - name: upload artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./VoidCrewTerminus/bin/Release/net472/Releases/VoidCrewTerminus-${{steps.tagName.outputs.tag}}.zip
        asset_name: VoidCrewTerminus-${{steps.tagName.outputs.tag}}.zip
        asset_content_type: application/zip
